apiVersion: v2
name: observability-logs-openobserve
description: A Helm chart for OpenChoreo Logs Module for OpenObserve
type: application
version: 0.4.1
appVersion: "0.4.1"
keywords:
  - openobserve
  - openchoreo
  - logs
maintainers:
  - name: OpenChoreo Team
home: https://github.com/openchoreo/community-modules
dependencies:
  - name: fluent-bit
    version: "0.56.0"
    repository: https://fluent.github.io/helm-charts
    condition: fluent-bit.enabled
  - name: openobserve-standalone
    version: "0.60.3"
    repository: https://charts.openobserve.ai
    condition: openobserve-standalone.enabled
  - name: openobserve
    version: "0.60.3"
    repository: https://charts.openobserve.ai
    condition: openobserve.enabled
